<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Approval Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="card">

```
<h1>💰 Loan Approval Prediction</h1>
<p class="subtitle">Enter applicant details to predict loan approval</p>

<form action="/predict" method="post">

    <input type="number" name="no_of_dependents" placeholder="No of Dependents" required>

    <select name="education" required>
        <option value="">Select Education</option>
        <option value="Graduate">Graduate</option>
        <option value="Not Graduate">Not Graduate</option>
    </select>

    <select name="self_employed" required>
        <option value="">Self Employed?</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
    </select>

    <input type="number" name="income_annum" placeholder="Annual Income" required>

    <input type="number" name="loan_amount" placeholder="Loan Amount" required>

    <input type="number" name="loan_term" placeholder="Loan Term (Months)" required>

    <input type="number" name="cibil_score" placeholder="CIBIL Score" required>

    <input type="number" name="residential_assets_value" placeholder="Residential Assets Value" required>

    <input type="number" name="commercial_assets_value" placeholder="Commercial Assets Value" required>

    <input type="number" name="luxury_assets_value" placeholder="Luxury Assets Value" required>

    <input type="number" name="bank_asset_value" placeholder="Bank Asset Value" required>

    <button type="submit">Predict Loan Status</button>

</form>

<h2>{{ prediction_text }}</h2>
```

</div>

</body>
</html>
